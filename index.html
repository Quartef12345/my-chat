<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>
    <div id = "login">
        <h1>Hello!</h1>
        <h3>Log In to Start Chatting!!</h3>
        <p>Username:</p>
        <input type="text" id="username" name="Username">
        <input type="button" value="Log In" onclick="logIn()">


    </div>

    <div id = "lobby_selector">
        <h1 id="lobby_selector_welcome_header">Welcome </h1>
        <h3>Choose a lobby number to chat</h3>
        <p>Lobby:</p>
        <input id = "lobby_id" type="number" value="0000">
        <input type="button" value="Log In" onclick="lobby()">


    </div>
    <div id = "chat">
        <h1 id="chat_header">Lobby: </h1>
        <input type="button" value="Return to lobby selector" onclick="returnToLobbySelector()">
        <br><hr>
        <p>
        <input id = "previous_page_bt"type="button" disabled value="Previous Page" onclick="changePage(-1)">
        <span id = "page_number">1/1</span> 
        <input id = "next_page_bt" type="button" disabled value="Next Page" onclick="changePage(1)">
        </p>
        <hr>
        
        <div id="message_board">
        </div>
        <hr>
        <input id = "message" type="text" value="">
        <input type="button" value="Send Message" onclick="sendMessage()">
        <br><hr>
        <input type="button" value="Load Messages History" onclick="loadHistory()">


    </div>
  <!-- Carrega o Socket.io do servidor -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    console.log('Ligado ao servidor!')
    document.getElementById('lobby_selector').style.display = 'none'
    document.getElementById('chat').style.display = 'none'
    let username = ""
    let lobby_id = 0
    let lobby_history = []
    let messages_array = []
    let current_page = 1
    const messages_per_page = 10


    function logIn(){
        username = document.getElementById('username').value
        console.log(username)
        document.getElementById('login').style.display = 'none'
        document.getElementById('lobby_selector').style.display = 'block'

        document.getElementById("lobby_selector_welcome_header").textContent = "Welcome " + username
    }
    function lobby(){
        lobby_id = document.getElementById('lobby_id').value
        document.getElementById('lobby_selector').style.display = 'none'
        document.getElementById('chat').style.display = 'block'
        document.getElementById("chat_header").textContent = "Lobby: " + lobby_id
        
        console.log(lobby_id)
        cleanText() 
        socket.emit('enter_lobby', { user: username, lobby: lobby_id })
    }
    function returnToLobbySelector(){
        document.getElementById('lobby_selector').style.display = 'block'
        document.getElementById('chat').style.display = 'none'
        document.getElementById("lobby_selector_welcome_header").textContent = "Welcome " + username
        
        console.log(lobby_id)
        socket.emit('left_lobby', { user: username, lobby: lobby_id })
    }
    function sendMessage(){
        let message_text =  document.getElementById('message').value
        document.getElementById('message').value = ""
        console.log(username + ' sent message to lobby ' + lobby_id + " message " + message_text)
        socket.emit('send_message', { user: username, lobby: lobby_id, message: message_text})
    }
    function loadHistory(){
        socket.emit('retrieve_history', lobby_id)
    }
    function changePage(factor){
        current_page += factor
        if(current_page == 1){
            document.getElementById("previous_page_bt").disabled = true
        }
        else{
            document.getElementById("previous_page_bt").disabled = false
        }
        if(current_page * messages_per_page >= messages_array.length){
            document.getElementById("next_page_bt").disabled = true
        }
        else{
            document.getElementById("next_page_bt").disabled = false
        }
        document.getElementById("page_number").innerText = current_page + "/" + Math.floor((messages_array.length / messages_per_page) + 1)
        updateTextPage()
    }
    function updateTextPage(){
        cleanText()
        page_messages = messages_array.slice((current_page - 1) * messages_per_page, messages_per_page * current_page)
        page_messages.forEach(message => {
        updateText(message)
        });
    }
    function updateText(new_message_data){
        const mes = document.createElement("p");
        mes.innerText = new_message_data.user + ': ' + new_message_data.message;
        document.getElementById("message_board").appendChild(mes);
    }
    function cleanText(){
        document.getElementById("message_board").innerHTML = ""; 
    }
    socket.on('receive_message', (data) => {
        console.log(data.user + ': ' + data.message)
        updateText(data)
    })
    socket.on('load_history', (data) => {
        console.log("This lobby history is")
        cleanText()
        lobby_history = data
        messages_array = data
        data.forEach(message => {
            updateText(message)
        });
        changePage( -current_page + Math.floor((messages_array.length / messages_per_page) + 1))
    })
    document.getElementById('message').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
        sendMessage()
    }
    })
    </script>
</body>
</html>
